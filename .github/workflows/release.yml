name: release

# Builds the gem (.gem). On a v* tag it is also attached to a GitHub Release.
# Publishing to RubyGems is a separate, later step — no tokens are used here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - run: gem build ip-api-io.gemspec
      - uses: actions/upload-artifact@v4
        with:
          name: ruby-package
          path: "*.gem"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" *.gem --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" *.gem --clobber
